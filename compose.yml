---
services:
  database:
    image: mounikaaarepu/pyapp:database_image
    deploy:
      replicas: 1
    ports:
      - "3306:3306"  
    networks:
      - mynetwork  


  auth_service:
    image: mounikaaarepu/pyapp:auth_image
    deploy:
      replicas: 1
    ports:
      - "5001:5001"
    networks:
      - mynetwork
    depends_on:
      - database


  book_service:
    image: mounikaaarepu/pyapp:book_image
    deploy:
      replicas: 1
    ports:
      - "5002:5002"
    networks:
      - mynetwork
    depends_on:
      - database


  borrow_service:
    image: mounikaaarepu/pyapp:borrow_image
    deploy:
      replicas: 1
    ports:
      - "5003:5003"
    networks:
      - mynetwork
    depends_on:
      - database

  frontend:
    image: mounikaaarepu/pyapp:frontend
    deploy:
      replicas: 1
    ports:
      - "5000:5000"
    depends_on:
      - auth
      - book
      - borrow

networks:
  mynetwork:
    driver: overlay
